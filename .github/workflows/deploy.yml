name: Deploy

# Despliega producción cuando un push a main supera el workflow "Tests".
# Se dispara mediante workflow_run para garantizar que solo desplegamos
# cuando los tests, lint y typecheck han pasado.

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy a producción
    # Solo si los tests pasaron en main
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Desplegar vía SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd /data/itakai
            git fetch origin main
            git reset --hard origin/main
            ./scripts/deploy.sh --all

      - name: Resumen
        if: success()
        run: |
          echo "✅ Deploy completado en producción"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"
