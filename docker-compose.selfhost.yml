# =============================================================================
# ITAKAI — despliegue AUTO-HOSTEABLE (turnkey, sin dependencias privadas).
#
# A diferencia de docker-compose.prod.yml (que usa red host + VPN para el Spark
# privado), este stack corre en red bridge y no necesita VPN: la IA, el
# almacenamiento y el dominio se configuran desde el panel de administración.
#
# Uso:
#   1) cp .env.selfhost.example .env.selfhost   # y rellena los secretos
#   2) docker compose -f docker-compose.selfhost.yml --env-file .env.selfhost up -d --build
#   3) entra como admin → Configuración → conecta tu IA / almacenamiento / dominio.
# =============================================================================
name: itakai

services:
  postgres:
    image: postgres:16-alpine
    container_name: itakai-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-itakai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en .env.selfhost}
      POSTGRES_DB: ${POSTGRES_DB:-itakai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itakai} -d ${POSTGRES_DB:-itakai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [itakai]

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: itakai-api
    env_file: [.env.selfhost]
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-itakai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-itakai}
    # Aplica migraciones pendientes y arranca (turnkey sobre una BD nueva).
    command: sh -c "pnpm exec prisma migrate deploy && pnpm tsx src/index.ts"
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [itakai]

  # Genera la SPA estática (API base relativa `/api` → independiente del dominio)
  # y la deja en el volumen compartido que sirve nginx. Es un job de un solo uso.
  app-builder:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: builder
      args:
        NUXT_PUBLIC_API_BASE: /api
        NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${NUXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    container_name: itakai-app-builder
    environment:
      NUXT_PUBLIC_API_BASE: /api
      NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${NUXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    command: sh -c "pnpm generate && rm -rf /static/* && cp -a .output/public/. /static/"
    volumes:
      - static_html:/static
    networks: [itakai]

  nginx:
    image: nginx:alpine
    container_name: itakai-nginx
    depends_on:
      api:
        condition: service_started
      app-builder:
        condition: service_completed_successfully
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - static_html:/usr/share/nginx/html:ro
      - ./app/nginx/selfhost.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks: [itakai]

volumes:
  postgres_data:
  api_uploads:
  static_html:

networks:
  itakai:
    name: itakai
