<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="olimpico-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#2C3E50"/>
    </linearGradient>
    <linearGradient id="olimpico-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#olimpico-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Olympic torch -->
  <rect x="46" y="45" width="8" height="30" fill="url(#olimpico-gold)"/>
  <rect x="44" y="72" width="12" height="6" rx="2" fill="url(#olimpico-gold)"/>
  <!-- Torch bowl -->
  <ellipse cx="50" cy="45" rx="10" ry="5" fill="url(#olimpico-gold)"/>
  <!-- Olympic flame -->
  <path d="M50 20 Q42 30 45 38 Q48 42 50 40 Q52 42 55 38 Q58 30 50 20" fill="#FF6B35"/>
  <path d="M50 25 Q45 32 47 38 Q49 40 50 38 Q51 40 53 38 Q55 32 50 25" fill="#FFD700"/>
  <path d="M50 30 Q48 35 49 38 Q50 39 51 38 Q52 35 50 30" fill="#fff" opacity="0.8"/>
  <!-- Olive wreath around torch -->
  <path d="M30 50 Q25 40 35 35" fill="none" stroke="#228B22" stroke-width="3"/>
  <path d="M70 50 Q75 40 65 35" fill="none" stroke="#228B22" stroke-width="3"/>
  <path d="M30 50 Q25 60 35 65" fill="none" stroke="#228B22" stroke-width="3"/>
  <path d="M70 50 Q75 60 65 65" fill="none" stroke="#228B22" stroke-width="3"/>
  <!-- Olive leaves -->
  <ellipse cx="28" cy="45" rx="3" ry="6" fill="#228B22" transform="rotate(-30 28 45)"/>
  <ellipse cx="72" cy="45" rx="3" ry="6" fill="#228B22" transform="rotate(30 72 45)"/>
  <ellipse cx="28" cy="55" rx="3" ry="6" fill="#228B22" transform="rotate(30 28 55)"/>
  <ellipse cx="72" cy="55" rx="3" ry="6" fill="#228B22" transform="rotate(-30 72 55)"/>
  <!-- Roman numeral C (100) -->
  <text x="50" y="88" font-family="serif" font-size="10" font-weight="bold" fill="#D4AF37" text-anchor="middle">C</text>
  <!-- Stars -->
  <circle cx="18" cy="22" r="1.5" fill="#fff"/>
  <circle cx="82" cy="25" r="1.5" fill="#fff"/>
  <circle cx="15" cy="75" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="85" cy="78" r="1" fill="#fff" opacity="0.7"/>
</svg>
