<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="hermes-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667EEA"/>
      <stop offset="100%" style="stop-color:#764BA2"/>
    </linearGradient>
    <linearGradient id="wing-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC338"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#hermes-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Left wing -->
  <path d="M25 50 Q20 35 30 25 Q40 30 45 45 Q35 48 25 50 Z" fill="url(#wing-gold)"/>
  <path d="M28 48 Q25 38 32 30 Q38 34 42 44 Q35 46 28 48 Z" fill="#fff" opacity="0.4"/>
  <!-- Right wing -->
  <path d="M75 50 Q80 35 70 25 Q60 30 55 45 Q65 48 75 50 Z" fill="url(#wing-gold)"/>
  <path d="M72 48 Q75 38 68 30 Q62 34 58 44 Q65 46 72 48 Z" fill="#fff" opacity="0.4"/>
  <!-- Center sandal/helmet -->
  <ellipse cx="50" cy="52" rx="12" ry="8" fill="url(#wing-gold)"/>
  <ellipse cx="50" cy="50" rx="8" ry="5" fill="#fff" opacity="0.5"/>
  <!-- Decorative feather lines -->
  <path d="M30 40 L38 42" stroke="#fff" stroke-width="1" opacity="0.6"/>
  <path d="M27 45 L36 46" stroke="#fff" stroke-width="1" opacity="0.6"/>
  <path d="M70 40 L62 42" stroke="#fff" stroke-width="1" opacity="0.6"/>
  <path d="M73 45 L64 46" stroke="#fff" stroke-width="1" opacity="0.6"/>
  <!-- Number 7 for streak -->
  <text x="50" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#FFD700">VII</text>
</svg>
