<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="periodic-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A9EFF"/>
      <stop offset="100%" style="stop-color:#1a237e"/>
    </linearGradient>
    <linearGradient id="element-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#periodic-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Central element box -->
  <rect x="35" y="30" width="30" height="35" rx="3" fill="url(#element-gold)"/>
  <rect x="37" y="32" width="26" height="31" rx="2" fill="#1a237e"/>
  <!-- Element symbol -->
  <text x="50" y="52" font-family="serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Au</text>
  <text x="50" y="60" font-family="sans-serif" font-size="6" fill="#D4AF37" text-anchor="middle">79</text>
  <!-- Surrounding mini elements -->
  <rect x="20" y="25" width="12" height="14" rx="2" fill="#E8E8E8" opacity="0.8"/>
  <text x="26" y="35" font-family="serif" font-size="8" fill="#1a237e" text-anchor="middle">H</text>
  <rect x="68" y="25" width="12" height="14" rx="2" fill="#E8E8E8" opacity="0.8"/>
  <text x="74" y="35" font-family="serif" font-size="8" fill="#1a237e" text-anchor="middle">He</text>
  <rect x="20" y="56" width="12" height="14" rx="2" fill="#E8E8E8" opacity="0.8"/>
  <text x="26" y="66" font-family="serif" font-size="8" fill="#1a237e" text-anchor="middle">O</text>
  <rect x="68" y="56" width="12" height="14" rx="2" fill="#E8E8E8" opacity="0.8"/>
  <text x="74" y="66" font-family="serif" font-size="8" fill="#1a237e" text-anchor="middle">C</text>
  <!-- Crown decoration on top -->
  <polygon points="50,22 44,28 47,28 47,26 50,24 53,26 53,28 56,28" fill="#D4AF37"/>
  <!-- Laurel wreath sides -->
  <path d="M22 45 Q15 50 22 55" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <path d="M78 45 Q85 50 78 55" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <!-- Base decoration -->
  <rect x="30" y="72" width="40" height="4" rx="2" fill="#D4AF37" opacity="0.6"/>
  <!-- Stars -->
  <circle cx="18" cy="18" r="1.5" fill="#fff"/>
  <circle cx="82" cy="20" r="1.5" fill="#fff"/>
  <circle cx="15" cy="78" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="85" cy="80" r="1" fill="#fff" opacity="0.7"/>
</svg>
