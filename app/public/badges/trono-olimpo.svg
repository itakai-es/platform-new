<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="olimpo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#FFC338"/>
      <stop offset="70%" style="stop-color:#DAA520"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="throne-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="throne-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DAA520"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="cloud-white" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#E8E8E8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#olimpo-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <!-- Divine rays -->
  <path d="M50 5 L52 20 L48 20 Z" fill="#fff" opacity="0.4"/>
  <path d="M75 12 L65 25 L62 22 Z" fill="#fff" opacity="0.3"/>
  <path d="M25 12 L35 25 L38 22 Z" fill="#fff" opacity="0.3"/>
  <!-- Clouds at base -->
  <ellipse cx="25" cy="82" rx="18" ry="8" fill="url(#cloud-white)" opacity="0.8"/>
  <ellipse cx="75" cy="82" rx="18" ry="8" fill="url(#cloud-white)" opacity="0.8"/>
  <ellipse cx="50" cy="85" rx="25" ry="10" fill="url(#cloud-white)" opacity="0.9"/>
  <ellipse cx="40" cy="80" rx="12" ry="5" fill="#fff" opacity="0.6"/>
  <ellipse cx="60" cy="80" rx="12" ry="5" fill="#fff" opacity="0.6"/>
  <!-- Throne back (tall) -->
  <path d="M30 30 L32 65 L68 65 L70 30 Q50 20 30 30" fill="url(#throne-gold)"/>
  <path d="M35 35 L36 62 L64 62 L65 35 Q50 28 35 35" fill="url(#throne-dark)" opacity="0.3"/>
  <!-- Throne back ornament -->
  <circle cx="50" cy="32" r="6" fill="url(#throne-gold)" stroke="#B8860B" stroke-width="1"/>
  <circle cx="50" cy="32" r="3" fill="#fff" opacity="0.5"/>
  <!-- Crown points on throne back -->
  <path d="M30 30 L28 22 L35 28" fill="url(#throne-gold)"/>
  <path d="M70 30 L72 22 L65 28" fill="url(#throne-gold)"/>
  <path d="M50 25 L50 18 L50 25" fill="url(#throne-gold)"/>
  <circle cx="28" cy="22" r="2" fill="url(#throne-gold)"/>
  <circle cx="72" cy="22" r="2" fill="url(#throne-gold)"/>
  <circle cx="50" cy="18" r="2.5" fill="url(#throne-gold)"/>
  <!-- Throne seat -->
  <rect x="32" y="55" width="36" height="8" rx="2" fill="url(#throne-gold)"/>
  <rect x="35" y="57" width="30" height="4" fill="#8B6914" opacity="0.3"/>
  <!-- Throne armrests -->
  <rect x="28" y="45" width="8" height="20" rx="2" fill="url(#throne-gold)"/>
  <rect x="64" y="45" width="8" height="20" rx="2" fill="url(#throne-gold)"/>
  <!-- Armrest orbs -->
  <circle cx="32" cy="45" r="4" fill="url(#throne-gold)"/>
  <circle cx="68" cy="45" r="4" fill="url(#throne-gold)"/>
  <circle cx="32" cy="45" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="68" cy="45" r="2" fill="#fff" opacity="0.4"/>
  <!-- Throne legs (visible through clouds) -->
  <rect x="33" y="63" width="5" height="12" fill="url(#throne-dark)"/>
  <rect x="62" y="63" width="5" height="12" fill="url(#throne-dark)"/>
  <!-- Stars -->
  <circle cx="18" cy="40" r="1.5" fill="#fff"/>
  <circle cx="82" cy="38" r="1.5" fill="#fff"/>
  <circle cx="15" cy="60" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="85" cy="55" r="1" fill="#fff" opacity="0.7"/>
</svg>
