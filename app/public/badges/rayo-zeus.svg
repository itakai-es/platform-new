<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="zeus-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="lightning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="30%" style="stop-color:#FFD700"/>
      <stop offset="70%" style="stop-color:#FFC338"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="lightning-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#FFE066"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#zeus-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.2"/>
  <!-- Storm clouds -->
  <ellipse cx="30" cy="25" rx="15" ry="8" fill="#4a4a6a" opacity="0.6"/>
  <ellipse cx="50" cy="20" rx="18" ry="10" fill="#5a5a7a" opacity="0.7"/>
  <ellipse cx="70" cy="25" rx="15" ry="8" fill="#4a4a6a" opacity="0.6"/>
  <ellipse cx="40" cy="22" rx="12" ry="6" fill="#6a6a8a" opacity="0.5"/>
  <ellipse cx="60" cy="22" rx="12" ry="6" fill="#6a6a8a" opacity="0.5"/>
  <!-- Lightning bolt glow -->
  <path d="M55 28 L42 50 L52 50 L38 78 L58 52 L48 52 L62 28 Z" fill="#FFD700" opacity="0.3" filter="url(#glow)"/>
  <!-- Main lightning bolt -->
  <path d="M55 28 L42 50 L52 50 L38 78 L58 52 L48 52 L62 28 Z" fill="url(#lightning-gold)" filter="url(#glow)"/>
  <!-- Lightning bolt highlight -->
  <path d="M54 32 L46 48 L52 48 L44 68" fill="none" stroke="url(#lightning-glow)" stroke-width="3" opacity="0.7"/>
  <!-- Electric sparks around bolt -->
  <circle cx="35" cy="45" r="1.5" fill="#FFE066" opacity="0.8"/>
  <circle cx="65" cy="55" r="1.5" fill="#FFE066" opacity="0.8"/>
  <circle cx="40" cy="70" r="1" fill="#FFD700" opacity="0.6"/>
  <circle cx="60" cy="35" r="1" fill="#FFD700" opacity="0.6"/>
  <!-- Small lightning branches -->
  <path d="M42 50 L35 55" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <path d="M58 52 L65 48" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <!-- Stars -->
  <circle cx="18" cy="60" r="1.5" fill="#fff"/>
  <circle cx="82" cy="65" r="1.5" fill="#fff"/>
  <circle cx="22" cy="80" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="78" cy="78" r="1" fill="#fff" opacity="0.7"/>
</svg>
