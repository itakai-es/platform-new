<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="chem-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="flask-glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8F4F8"/>
      <stop offset="50%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#B0C4DE"/>
    </linearGradient>
    <linearGradient id="potion" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#6C3483"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#chem-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Flask neck -->
  <rect x="44" y="20" width="12" height="15" fill="url(#flask-glass)"/>
  <!-- Flask body -->
  <path d="M44 35 L30 60 Q25 75 50 80 Q75 75 70 60 L56 35" fill="url(#flask-glass)"/>
  <!-- Potion liquid -->
  <path d="M35 58 Q30 72 50 76 Q70 72 65 58 L60 50 L40 50" fill="url(#potion)"/>
  <!-- Bubbles in potion -->
  <circle cx="42" cy="62" r="3" fill="#D8BFD8" opacity="0.6"/>
  <circle cx="55" cy="68" r="2" fill="#D8BFD8" opacity="0.6"/>
  <circle cx="48" cy="72" r="2.5" fill="#D8BFD8" opacity="0.6"/>
  <!-- Flask rim (gold) -->
  <rect x="42" y="18" width="16" height="4" rx="2" fill="#D4AF37"/>
  <!-- Magical sparkles -->
  <circle cx="38" cy="40" r="2" fill="#FFD700"/>
  <circle cx="62" cy="42" r="2" fill="#FFD700"/>
  <circle cx="50" cy="45" r="1.5" fill="#FFD700"/>
  <!-- Atom orbits around flask -->
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.5" transform="rotate(-30 50 50)"/>
  <circle cx="22" cy="38" r="3" fill="#D4AF37"/>
  <!-- Stars -->
  <circle cx="18" cy="25" r="1.5" fill="#fff"/>
  <circle cx="82" cy="28" r="1.5" fill="#fff"/>
  <circle cx="15" cy="70" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="85" cy="72" r="1" fill="#fff" opacity="0.7"/>
</svg>
