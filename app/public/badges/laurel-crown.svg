<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="laurel-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F093FB"/>
      <stop offset="100%" style="stop-color:#F5576C"/>
    </linearGradient>
    <linearGradient id="gold-leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC338"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#laurel-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Left laurel branch -->
  <path d="M50 75 Q30 70 25 55" stroke="url(#gold-leaf)" stroke-width="3" fill="none"/>
  <!-- Left leaves -->
  <ellipse cx="28" cy="62" rx="6" ry="3" fill="url(#gold-leaf)" transform="rotate(-30 28 62)"/>
  <ellipse cx="32" cy="55" rx="6" ry="3" fill="url(#gold-leaf)" transform="rotate(-40 32 55)"/>
  <ellipse cx="35" cy="47" rx="6" ry="3" fill="url(#gold-leaf)" transform="rotate(-50 35 47)"/>
  <ellipse cx="40" cy="40" rx="6" ry="3" fill="url(#gold-leaf)" transform="rotate(-60 40 40)"/>
  <ellipse cx="45" cy="34" rx="5" ry="2.5" fill="url(#gold-leaf)" transform="rotate(-70 45 34)"/>
  <ellipse cx="48" cy="28" rx="4" ry="2" fill="url(#gold-leaf)" transform="rotate(-80 48 28)"/>
  <!-- Right laurel branch -->
  <path d="M50 75 Q70 70 75 55" stroke="url(#gold-leaf)" stroke-width="3" fill="none"/>
  <!-- Right leaves -->
  <ellipse cx="72" cy="62" rx="6" ry="3" fill="url(#gold-leaf)" transform="rotate(30 72 62)"/>
  <ellipse cx="68" cy="55" rx="6" ry="3" fill="url(#gold-leaf)" transform="rotate(40 68 55)"/>
  <ellipse cx="65" cy="47" rx="6" ry="3" fill="url(#gold-leaf)" transform="rotate(50 65 47)"/>
  <ellipse cx="60" cy="40" rx="6" ry="3" fill="url(#gold-leaf)" transform="rotate(60 60 40)"/>
  <ellipse cx="55" cy="34" rx="5" ry="2.5" fill="url(#gold-leaf)" transform="rotate(70 55 34)"/>
  <ellipse cx="52" cy="28" rx="4" ry="2" fill="url(#gold-leaf)" transform="rotate(80 52 28)"/>
  <!-- Center ribbon/tie -->
  <path d="M46 75 Q50 80 54 75" stroke="url(#gold-leaf)" stroke-width="2" fill="none"/>
  <circle cx="50" cy="75" r="3" fill="url(#gold-leaf)"/>
  <!-- Shine effects on leaves -->
  <ellipse cx="32" cy="54" rx="2" ry="1" fill="#fff" opacity="0.4" transform="rotate(-40 32 54)"/>
  <ellipse cx="68" cy="54" rx="2" ry="1" fill="#fff" opacity="0.4" transform="rotate(40 68 54)"/>
  <!-- Level number -->
  <text x="50" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#fff">X</text>
</svg>
