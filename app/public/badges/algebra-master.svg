<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="algebra-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="scroll-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#algebra-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Ancient scroll base -->
  <rect x="25" y="28" width="50" height="44" rx="3" fill="#F5E6D3"/>
  <rect x="22" y="26" width="8" height="48" rx="4" fill="url(#scroll-gold)"/>
  <rect x="70" y="26" width="8" height="48" rx="4" fill="url(#scroll-gold)"/>
  <!-- Mathematical symbols on scroll -->
  <text x="50" y="42" font-family="serif" font-size="14" font-weight="bold" fill="#4A3728" text-anchor="middle">x² + y²</text>
  <text x="50" y="58" font-family="serif" font-size="12" fill="#4A3728" text-anchor="middle">= z²</text>
  <!-- Decorative equals sign with laurel -->
  <path d="M35 65 Q50 70 65 65" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <!-- Greek key pattern decoration -->
  <rect x="30" y="72" width="40" height="3" fill="#D4AF37" opacity="0.6"/>
  <!-- Stars -->
  <circle cx="18" cy="30" r="1.5" fill="#fff"/>
  <circle cx="82" cy="35" r="1.5" fill="#fff"/>
  <circle cx="15" cy="55" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="85" cy="60" r="1" fill="#fff" opacity="0.7"/>
  <!-- Crown on top -->
  <polygon points="50,18 45,26 47,26 47,24 50,22 53,24 53,26 55,26" fill="#D4AF37"/>
</svg>
