<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="dragon-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <linearGradient id="sword-steel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="50%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#C0C0C0"/>
    </linearGradient>
    <linearGradient id="hilt-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#dragon-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Dragon silhouette -->
  <path d="M25 55 Q20 45 28 40 Q35 35 40 40 L45 38 Q50 32 55 38 L60 40 Q65 35 72 40 Q80 45 75 55 Q78 60 72 65 Q65 72 55 70 L50 75 L45 70 Q35 72 28 65 Q22 60 25 55" fill="#2D0000" opacity="0.5"/>
  <!-- Sword (vertical, crossing dragon) -->
  <rect x="47" y="18" width="6" height="50" fill="url(#sword-steel)"/>
  <!-- Sword tip -->
  <polygon points="50,15 47,18 53,18" fill="url(#sword-steel)"/>
  <!-- Sword hilt -->
  <rect x="45" y="68" width="10" height="4" fill="url(#hilt-gold)"/>
  <rect x="48" y="72" width="4" height="8" fill="url(#hilt-gold)"/>
  <!-- Hilt decorations -->
  <circle cx="50" cy="80" r="3" fill="url(#hilt-gold)"/>
  <circle cx="50" cy="70" r="2" fill="#8B0000"/>
  <!-- Fire effects -->
  <ellipse cx="35" cy="48" rx="4" ry="6" fill="#FFD700" opacity="0.6"/>
  <ellipse cx="65" cy="48" rx="4" ry="6" fill="#FFD700" opacity="0.6"/>
  <!-- Stars -->
  <circle cx="18" cy="25" r="1.5" fill="#fff"/>
  <circle cx="82" cy="28" r="1.5" fill="#fff"/>
  <circle cx="15" cy="70" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="85" cy="72" r="1" fill="#fff" opacity="0.7"/>
</svg>
