<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="nectar-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="amphora-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="50%" style="stop-color:#FFC338"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <linearGradient id="nectar-liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5AF19"/>
      <stop offset="100%" style="stop-color:#F12711"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#nectar-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Amphora body -->
  <path d="M35 35 Q30 50 35 70 Q40 80 50 82 Q60 80 65 70 Q70 50 65 35 Z" fill="url(#amphora-gold)"/>
  <path d="M38 38 Q34 50 38 68 Q42 76 50 78 Q58 76 62 68 Q66 50 62 38 Z" fill="#fff" opacity="0.2"/>
  <!-- Amphora neck -->
  <rect x="43" y="22" width="14" height="13" fill="url(#amphora-gold)"/>
  <rect x="45" y="24" width="4" height="10" fill="#fff" opacity="0.2"/>
  <!-- Amphora rim -->
  <ellipse cx="50" cy="22" rx="10" ry="4" fill="url(#amphora-gold)"/>
  <ellipse cx="50" cy="22" rx="7" ry="2.5" fill="#DAA520"/>
  <!-- Amphora handles -->
  <path d="M35 35 Q25 40 28 55 Q30 60 35 58" fill="none" stroke="url(#amphora-gold)" stroke-width="4"/>
  <path d="M65 35 Q75 40 72 55 Q70 60 65 58" fill="none" stroke="url(#amphora-gold)" stroke-width="4"/>
  <!-- Pouring nectar -->
  <path d="M55 22 Q60 18 62 15 Q58 12 55 18" fill="url(#nectar-liquid)"/>
  <ellipse cx="62" cy="14" rx="3" ry="2" fill="url(#nectar-liquid)" opacity="0.8"/>
  <!-- Decorative pattern on amphora -->
  <path d="M38 50 L62 50" stroke="#DAA520" stroke-width="2" opacity="0.6"/>
  <path d="M40 58 L60 58" stroke="#DAA520" stroke-width="1.5" opacity="0.6"/>
  <!-- Nectar drops -->
  <circle cx="65" cy="20" r="2" fill="#F5AF19" opacity="0.9"/>
  <circle cx="68" cy="25" r="1.5" fill="#F5AF19" opacity="0.7"/>
  <!-- Stars -->
  <circle cx="22" cy="25" r="1.5" fill="#fff"/>
  <circle cx="78" cy="30" r="1.5" fill="#fff"/>
  <circle cx="20" cy="75" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="80" cy="70" r="1" fill="#fff" opacity="0.7"/>
</svg>
