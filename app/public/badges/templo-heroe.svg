<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="temple-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43CEA2"/>
      <stop offset="100%" style="stop-color:#185A9D"/>
    </linearGradient>
    <linearGradient id="marble" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E8E8E8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#temple-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Temple roof (pediment) -->
  <polygon points="50,18 25,38 75,38" fill="url(#marble)"/>
  <polygon points="50,22 30,36 70,36" fill="#D4AF37" opacity="0.3"/>
  <!-- Temple roof decoration -->
  <circle cx="50" cy="28" r="4" fill="#D4AF37"/>
  <!-- Columns -->
  <rect x="30" y="38" width="6" height="30" fill="url(#marble)"/>
  <rect x="42" y="38" width="6" height="30" fill="url(#marble)"/>
  <rect x="52" y="38" width="6" height="30" fill="url(#marble)"/>
  <rect x="64" y="38" width="6" height="30" fill="url(#marble)"/>
  <!-- Column capitals -->
  <rect x="28" y="36" width="10" height="4" fill="#D4AF37"/>
  <rect x="40" y="36" width="10" height="4" fill="#D4AF37"/>
  <rect x="50" y="36" width="10" height="4" fill="#D4AF37"/>
  <rect x="62" y="36" width="10" height="4" fill="#D4AF37"/>
  <!-- Temple base -->
  <rect x="25" y="68" width="50" height="6" fill="url(#marble)"/>
  <rect x="22" y="74" width="56" height="4" fill="#D4AF37" opacity="0.6"/>
  <!-- Inner glow (entrance) -->
  <rect x="44" y="45" width="12" height="23" fill="#FFD700" opacity="0.4"/>
  <rect x="46" y="48" width="8" height="20" fill="#fff" opacity="0.3"/>
  <!-- Stars around temple -->
  <circle cx="20" cy="25" r="1.5" fill="#fff"/>
  <circle cx="80" cy="28" r="1.5" fill="#fff"/>
  <circle cx="15" cy="45" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="85" cy="50" r="1" fill="#fff" opacity="0.7"/>
</svg>
