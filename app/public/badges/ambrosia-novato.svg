<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ambrosia-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F093FB"/>
      <stop offset="100%" style="stop-color:#F5576C"/>
    </linearGradient>
    <linearGradient id="goblet-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <linearGradient id="ambrosia-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4B5"/>
      <stop offset="100%" style="stop-color:#FFDAB9"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#ambrosia-bg)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Goblet base -->
  <ellipse cx="50" cy="78" rx="12" ry="4" fill="url(#goblet-gold)"/>
  <rect x="46" y="65" width="8" height="13" fill="url(#goblet-gold)"/>
  <!-- Goblet stem -->
  <ellipse cx="50" cy="65" rx="6" ry="2" fill="#DAA520"/>
  <rect x="48" y="55" width="4" height="10" fill="url(#goblet-gold)"/>
  <!-- Goblet bowl -->
  <path d="M32 35 Q30 55 40 55 L60 55 Q70 55 68 35 Z" fill="url(#goblet-gold)"/>
  <path d="M35 38 Q34 52 42 52 L58 52 Q66 52 65 38 Z" fill="url(#ambrosia-glow)" opacity="0.6"/>
  <!-- Goblet rim -->
  <ellipse cx="50" cy="35" rx="18" ry="5" fill="url(#goblet-gold)"/>
  <ellipse cx="50" cy="35" rx="14" ry="3" fill="url(#ambrosia-glow)" opacity="0.5"/>
  <!-- Magical glow above goblet -->
  <ellipse cx="50" cy="28" rx="10" ry="6" fill="#FFE4B5" opacity="0.4"/>
  <ellipse cx="50" cy="26" rx="6" ry="4" fill="#fff" opacity="0.3"/>
  <!-- Rising sparkles -->
  <circle cx="45" cy="22" r="1.5" fill="#fff" opacity="0.9"/>
  <circle cx="55" cy="18" r="1.5" fill="#fff" opacity="0.9"/>
  <circle cx="50" cy="15" r="2" fill="#FFD700" opacity="0.8"/>
  <!-- Decorative stars -->
  <circle cx="20" cy="25" r="1.5" fill="#fff"/>
  <circle cx="80" cy="28" r="1.5" fill="#fff"/>
  <circle cx="18" cy="70" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="82" cy="65" r="1" fill="#fff" opacity="0.7"/>
</svg>
