services:
  postgres:
    image: postgres:16-alpine
    container_name: itakai-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-itakai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-itakai_dev}
      POSTGRES_DB: ${POSTGRES_DB:-itakai_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itakai -d itakai_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itakai-backend
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-itakai}:${POSTGRES_PASSWORD:-itakai_dev}@postgres:5432/${POSTGRES_DB:-itakai_dev}
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - shared-proxy-network

  adminer:
    image: adminer
    container_name: itakai-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data_dev:
  uploads_data:

networks:
  default:
    name: itakai-network
  shared-proxy-network:
    external: true
